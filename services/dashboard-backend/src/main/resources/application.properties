quarkus.application.name=dashboard-backend

# Service URLs (overridden by env vars in Deployment)
ONPREM_GATEWAY_URL=http://cluster-gateway.banking-demo.svc.cluster.local:8080
CLOUD_GATEWAY_URL=http://cloud-cluster-gateway.banking-demo.svc.cluster.local:8080
ONPREM_LEDGER_URL=http://ledger-service.banking-demo.svc.cluster.local:8080
CLOUD_LEDGER_URL=http://cloud-ledger-service.banking-demo.svc.cluster.local:8080

# WebSocket
quarkus.websockets-next.server.supported-subprotocols=metrics

# Health
quarkus.smallrye-health.root-path=/health
