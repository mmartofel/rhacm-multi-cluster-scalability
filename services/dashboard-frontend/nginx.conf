server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Defer upstream DNS resolution to request time so nginx starts even
    # when cluster-gateway or dashboard-backend are not yet available.
    resolver 172.30.0.10 valid=10s ipv6=off;

    # Proxy WebSocket to dashboard-backend
    location /ws/ {
        set $upstream_backend dashboard-backend.banking-demo.svc.cluster.local;
        proxy_pass         http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy REST API calls to cluster-gateway
    # No path suffix on proxy_pass — with a variable nginx passes the full
    # original URI unchanged, so /api/gateway/... reaches the upstream as-is.
    location /api/gateway/ {
        set $upstream_gateway cluster-gateway.banking-demo.svc.cluster.local;
        proxy_pass http://$upstream_gateway:8080;
        proxy_set_header Host $host;
    }

    # Proxy load-control calls to transaction-generator
    location /api/generator/ {
        set $upstream_generator transaction-generator.banking-demo.svc.cluster.local;
        proxy_pass http://$upstream_generator:8080;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
