server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Proxy WebSocket to dashboard-backend
    location /ws/ {
        proxy_pass         http://dashboard-backend.banking-demo.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy REST API calls to cluster-gateway
    location /api/gateway/ {
        proxy_pass http://cluster-gateway.banking-demo.svc.cluster.local:8080/api/gateway/;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
