quarkus.application.name=account-service

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
quarkus.datasource.username=${DATASOURCE_USER:postgres}
quarkus.datasource.password=${DATASOURCE_PASSWORD:postgres}
quarkus.hibernate-orm.database.generation=none

# Balance cache — 30s TTL to balance freshness vs. RPS on PostgreSQL
quarkus.cache.caffeine.balance.expire-after-write=30S
quarkus.cache.caffeine.balance.maximum-size=10000

# Health
quarkus.smallrye-health.root-path=/health
