quarkus.application.name=transaction-generator

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Outgoing channel → transactions-raw
mp.messaging.outgoing.transactions-out.connector=smallrye-kafka
mp.messaging.outgoing.transactions-out.topic=transactions-raw
mp.messaging.outgoing.transactions-out.value.serializer=io.apicurio.registry.serde.avro.AvroKafkaSerializer
mp.messaging.outgoing.transactions-out.apicurio.registry.url=${APICURIO_URL:http://localhost:8081}/apis/registry/v2
mp.messaging.outgoing.transactions-out.apicurio.registry.auto-register=true
mp.messaging.outgoing.transactions-out.apicurio.registry.find-latest=true
mp.messaging.outgoing.transactions-out.acks=all
mp.messaging.outgoing.transactions-out.max-in-flight=1024

# TPS controlled via env var or PUT /api/generator/tps/{rate}
TPS_RATE=100

# Health
quarkus.smallrye-health.root-path=/health
