quarkus.application.name=transaction-processor

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
quarkus.datasource.username=${DATASOURCE_USER:postgres}
quarkus.datasource.password=${DATASOURCE_PASSWORD:postgres}
quarkus.hibernate-orm.database.generation=none

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Incoming: transactions-raw
mp.messaging.incoming.transactions-in.connector=smallrye-kafka
mp.messaging.incoming.transactions-in.topic=transactions-raw
mp.messaging.incoming.transactions-in.group.id=transaction-processors-${SOURCE_CLUSTER:unknown}
mp.messaging.incoming.transactions-in.value.deserializer=io.apicurio.registry.serdes.avro.AvroKafkaDeserializer
mp.messaging.incoming.transactions-in.apicurio.registry.url=${APICURIO_URL:http://localhost:8081}/apis/registry/v2
mp.messaging.incoming.transactions-in.auto.offset.reset=latest

# Outgoing: transactions-committed
mp.messaging.outgoing.transactions-committed-out.connector=smallrye-kafka
mp.messaging.outgoing.transactions-committed-out.topic=transactions-committed
mp.messaging.outgoing.transactions-committed-out.value.serializer=io.apicurio.registry.serdes.avro.AvroKafkaSerializer
mp.messaging.outgoing.transactions-committed-out.apicurio.registry.url=${APICURIO_URL:http://localhost:8081}/apis/registry/v2
mp.messaging.outgoing.transactions-committed-out.apicurio.registry.auto-register=true
mp.messaging.outgoing.transactions-committed-out.acks=all

# REST client for account-service
quarkus.rest-client.account-service.url=${ACCOUNT_SERVICE_URL:http://account-service:8080}
quarkus.rest-client.account-service.connect-timeout=5000
quarkus.rest-client.account-service.read-timeout=5000

# Health
quarkus.smallrye-health.root-path=/health
