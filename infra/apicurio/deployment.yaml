apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry
  namespace: banking-infra
  labels:
    app: apicurio-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apicurio-registry
  template:
    metadata:
      labels:
        app: apicurio-registry
    spec:
      containers:
      - name: apicurio-registry
        image: quay.io/apicurio/apicurio-registry-kafkasql:2.6.4.Final
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: banking-kafka-kafka-bootstrap.banking-infra.svc.cluster.local:9092
        - name: QUARKUS_PROFILE
          value: prod
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      imagePullSecrets:
      - name: quay-pull-secret
