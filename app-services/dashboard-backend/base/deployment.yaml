apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: banking-demo
  labels:
    app: dashboard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      containers:
      - name: dashboard-backend
        image: quay.io/mmartofe/banking-demo-dashboard-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: ONPREM_GATEWAY_URL
          value: http://cluster-gateway.banking-demo.svc.cluster.local:8080
        - name: CLOUD_GATEWAY_URL
          value: http://cloud-cluster-gateway.banking-demo.svc.cluster.local:8080
        - name: ONPREM_LEDGER_URL
          value: http://ledger-service.banking-demo.svc.cluster.local:8080
        - name: CLOUD_LEDGER_URL
          value: http://cloud-ledger-service.banking-demo.svc.cluster.local:8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
      imagePullSecrets:
      - name: quay-pull-secret
